<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#040404"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8EF8A"/>
      <stop offset="25%" stop-color="#D4AF37"/>
      <stop offset="60%" stop-color="#A07820"/>
      <stop offset="100%" stop-color="#6B4E12"/>
    </linearGradient>
    <linearGradient id="gold2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EDD76A"/>
      <stop offset="50%" stop-color="#C49B28"/>
      <stop offset="100%" stop-color="#7A5510"/>
    </linearGradient>
    <linearGradient id="goldsm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0DC6A"/>
      <stop offset="50%" stop-color="#C8A025"/>
      <stop offset="100%" stop-color="#85640E"/>
    </linearGradient>
    <linearGradient id="amethyst" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DA9EFF"/>
      <stop offset="45%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#6B21A8"/>
    </linearGradient>
    <linearGradient id="wordgold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5E07A"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#AA8A2E"/>
    </linearGradient>
    <linearGradient id="lime" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5cb832"/>
      <stop offset="100%" stop-color="#72d43e"/>
    </linearGradient>
    <radialGradient id="ambient" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <filter id="pglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b5"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b14"/>
      <feMerge><feMergeNode in="b14"/><feMergeNode in="b5"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.8"/>
    </filter>
    <filter id="purplegear" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#A855F7" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Watermark gear shadow in bg -->
    <filter id="bgblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Faint watermark gear shape background -->
  <g opacity="0.04" filter="url(#bgblur)" transform="translate(600,180) scale(2.8)">
    <path d="M 229.79,174.47 L 241.57,171.97 L 241.57,184.03 L 229.79,181.53 L 227.56,189.84 L 239.01,193.56 L 232.98,204.00 L 224.04,195.95 L 217.95,202.04 L 226.00,210.98 L 215.56,217.01 L 211.84,205.56 L 203.53,207.79 L 206.03,219.57 L 193.97,219.57 L 196.47,207.79 L 188.16,205.56 L 184.44,217.01 L 174.00,210.98 L 182.05,202.04 L 175.96,195.95 L 167.02,204.00 L 160.99,193.56 L 172.44,189.84 L 170.21,181.53 L 158.43,184.03 L 158.43,171.97 L 170.21,174.47 L 172.44,166.16 L 160.99,162.44 L 167.02,152.00 L 175.96,160.05 L 182.05,153.96 L 174.00,145.02 L 184.44,138.99 L 188.16,150.44 L 196.47,148.21 L 193.97,136.43 L 206.03,136.43 L 203.53,148.21 L 211.84,150.44 L 215.56,138.99 L 226.00,145.02 L 217.95,153.96 L 224.04,160.05 L 232.98,152.00 L 239.01,162.44 L 227.56,166.16 Z" fill="#D4AF37"/>
    <circle cx="200" cy="178" r="29" fill="#D4AF37"/>
  </g>

  <!-- ═══ LOGO centered in top 55% of card ═══ -->
  <!-- viewBox 112 78 210 355 → natural 210×355
       scale 0.68 → 143w × 241h
       center x=600: translateX = 600 - (112+105)*0.68 = 600 - 147.6 = 452
       top pad 18px: translateY = 18 - 78*0.68 = 18 - 53 = -35               -->
  <g transform="translate(452, -35) scale(0.68)">
    <ellipse cx="205" cy="255" rx="150" ry="150" fill="url(#aura)"/>
    <ellipse cx="205" cy="178" rx="90" ry="85" fill="url(#ambient)"/>

    <!-- HEAD -->
    <g filter="url(#pglow)">
      <path d="M 258,90 C 238,85 205,88 182,102 C 155,118 138,148 132,180 C 126,212 130,244 133,265 C 135,278 134,292 132,306 C 129,322 124,334 124,350 C 124,368 136,378 152,380 C 164,381 174,374 180,364 C 185,355 186,342 186,328 L 186,314 C 200,322 220,326 238,320 C 256,314 268,300 274,284 C 279,268 275,250 278,237 C 282,218 296,207 305,192 C 314,176 313,154 306,136 C 298,116 280,97 258,90 Z"
            fill="none" stroke="#A855F7" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M 274,248 C 280,258 292,272 294,284 C 296,294 290,304 282,306 C 276,307 270,303 268,297" fill="none" stroke="#A855F7" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M 268,325 C 272,332 270,342 262,345 C 255,348 246,344 244,337" fill="none" stroke="#A855F7" stroke-width="2" stroke-linecap="round"/>
      <path d="M 302,188 C 296,181 285,179 278,183" fill="none" stroke="#A855F7" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M 295,204 C 289,198 280,197 275,202 C 280,208 289,208 295,204 Z" fill="none" stroke="#A855F7" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M 186,258 C 170,255 158,260 155,272 C 152,283 157,296 167,298 C 175,299 184,294 186,285" fill="none" stroke="#A855F7" stroke-width="2.1" stroke-linecap="round"/>
      <path d="M 152,380 C 154,396 157,412 156,422" fill="none" stroke="#A855F7" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- GEAR PRIMARY -->
    <g filter="url(#gshadow)">
      <path d="M 229.79,174.47 L 241.57,171.97 L 241.57,184.03 L 229.79,181.53 L 227.56,189.84 L 239.01,193.56 L 232.98,204.00 L 224.04,195.95 L 217.95,202.04 L 226.00,210.98 L 215.56,217.01 L 211.84,205.56 L 203.53,207.79 L 206.03,219.57 L 193.97,219.57 L 196.47,207.79 L 188.16,205.56 L 184.44,217.01 L 174.00,210.98 L 182.05,202.04 L 175.96,195.95 L 167.02,204.00 L 160.99,193.56 L 172.44,189.84 L 170.21,181.53 L 158.43,184.03 L 158.43,171.97 L 170.21,174.47 L 172.44,166.16 L 160.99,162.44 L 167.02,152.00 L 175.96,160.05 L 182.05,153.96 L 174.00,145.02 L 184.44,138.99 L 188.16,150.44 L 196.47,148.21 L 193.97,136.43 L 206.03,136.43 L 203.53,148.21 L 211.84,150.44 L 215.56,138.99 L 226.00,145.02 L 217.95,153.96 L 224.04,160.05 L 232.98,152.00 L 239.01,162.44 L 227.56,166.16 Z" fill="url(#gold)"/>
      <circle cx="200" cy="178" r="29" fill="url(#gold)"/>
      <line x1="200" y1="157" x2="200" y2="199" stroke="#8A6418" stroke-width="1.5" opacity="0.5"/>
      <line x1="179.9" y1="167.5" x2="220.1" y2="188.5" stroke="#8A6418" stroke-width="1.5" opacity="0.5"/>
      <line x1="220.1" y1="167.5" x2="179.9" y2="188.5" stroke="#8A6418" stroke-width="1.5" opacity="0.5"/>
      <circle cx="200" cy="178" r="9" fill="#080808" stroke="#D4AF37" stroke-width="1.8"/>
      <circle cx="200" cy="178" r="4" fill="#D4AF37"/>
    </g>

    <!-- GEAR SECONDARY -->
    <g filter="url(#gshadow)">
      <path d="M 271.00,140.31 L 278.00,139.56 L 276.34,148.96 L 270.02,145.86 L 266.58,151.81 L 272.43,155.73 L 265.12,161.87 L 262.27,155.43 L 255.82,157.78 L 257.77,164.54 L 248.23,164.54 L 250.18,157.78 L 243.73,155.43 L 240.88,161.87 L 233.57,155.73 L 239.42,151.81 L 235.98,145.86 L 229.66,148.96 L 228.00,139.56 L 235.00,140.31 L 236.20,133.55 L 229.36,131.86 L 234.13,123.60 L 239.01,128.67 L 244.27,124.26 L 240.12,118.57 L 249.09,115.31 L 249.57,122.33 L 256.43,122.33 L 256.91,115.31 L 265.88,118.57 L 261.73,124.26 L 266.99,128.67 L 271.87,123.60 L 276.64,131.86 L 269.80,133.55 Z" fill="url(#gold2)"/>
      <circle cx="253" cy="140" r="17.5" fill="url(#gold2)"/>
      <circle cx="253" cy="140" r="6.5" fill="#080808" stroke="#D4AF37" stroke-width="1.5"/>
    </g>

    <!-- GEAR TERTIARY amethyst -->
    <g filter="url(#purplegear)">
      <path d="M 177.94,220.57 L 183.82,219.18 L 183.00,228.57 L 177.45,226.17 L 174.28,232.26 L 179.42,235.43 L 172.20,241.49 L 169.97,235.87 L 163.43,237.94 L 164.82,243.82 L 155.43,243.00 L 157.83,237.45 L 151.74,234.28 L 148.57,239.42 L 142.51,232.20 L 148.13,229.97 L 146.06,223.43 L 140.18,224.82 L 141.00,215.43 L 146.55,217.83 L 149.72,211.74 L 144.58,208.57 L 151.80,202.51 L 154.03,208.13 L 160.57,206.06 L 159.18,200.18 L 168.57,201.00 L 166.17,206.55 L 172.26,209.72 L 175.43,204.58 L 181.49,211.80 L 175.87,214.03 Z" fill="url(#amethyst)"/>
      <circle cx="162" cy="222" r="15.5" fill="url(#amethyst)"/>
      <circle cx="162" cy="222" r="6" fill="#080808" stroke="#A855F7" stroke-width="1.4"/>
    </g>

    <!-- GEAR ACCENT small -->
    <g filter="url(#gshadow)">
      <path d="M 258.78,199.79 L 262.55,198.33 L 262.55,205.67 L 258.78,204.21 L 256.44,209.05 L 259.93,211.09 L 254.20,215.66 L 252.99,211.80 L 247.75,213.00 L 248.34,217.00 L 241.19,215.37 L 243.45,212.02 L 239.25,208.66 L 236.49,211.61 L 233.30,205.01 L 237.33,204.69 L 237.33,199.31 L 233.30,198.99 L 236.49,192.39 L 239.25,195.34 L 243.45,191.98 L 241.19,188.63 L 248.34,187.00 L 247.75,191.00 L 252.99,192.20 L 254.20,188.34 L 259.93,192.91 L 256.44,194.95 Z" fill="url(#goldsm)"/>
      <circle cx="248" cy="202" r="10.5" fill="url(#goldsm)"/>
      <circle cx="248" cy="202" r="4.5" fill="#080808" stroke="#C8A025" stroke-width="1.2"/>
    </g>
  </g>

  <!-- ═══ WORDMARK — bold, bottom half ═══ -->
  <!-- "Simple" white -->
  <text text-anchor="end" x="596" y="530"
        font-family="Impact, 'Arial Black', 'Franklin Gothic Heavy', sans-serif"
        font-size="148"
        fill="#ffffff"
        letter-spacing="-4">Simple</text>
  <!-- "Genius." gold -->
  <text text-anchor="start" x="608" y="530"
        font-family="Impact, 'Arial Black', 'Franklin Gothic Heavy', sans-serif"
        font-size="148"
        fill="url(#wordgold)"
        letter-spacing="-4">Genius.</text>

  <!-- Flanking lines + tagline -->
  <line x1="80" y1="565" x2="310" y2="565" stroke="url(#lime)" stroke-width="2.5" opacity="0.9"/>
  <line x1="890" y1="565" x2="1120" y2="565" stroke="url(#lime)" stroke-width="2.5" opacity="0.9"/>
  <text text-anchor="middle" x="600" y="572"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="20"
        fill="#5cb832"
        letter-spacing="6">SIMPLE SOLUTIONS. GENIUS RESULTS.</text>

  <!-- Gold bottom border -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#wordgold)" opacity="0.5"/>
</svg>
